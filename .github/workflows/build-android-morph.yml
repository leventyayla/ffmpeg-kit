name: Build Android AAR (Morph Full 16KB)

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub release on success"
        required: false
        default: true
        type: boolean
      release_tag:
        description: "Release tag for JitPack"
        required: false
        default: "v6.0-5-morph-full-16kb"
        type: string

permissions:
  contents: write

jobs:
  build-armv7a:
    name: Build arm-v7a
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            curl git doxygen nasm cmake gcc gperf texinfo yasm bison \
            autogen wget autopoint meson ninja-build ragel groff gtk-doc-tools \
            libtool-bin

      - name: Setup Android SDK & NDK
        run: |
          export ANDROID_SDK_ROOT="${HOME}/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd "${ANDROID_SDK_ROOT}/cmdline-tools"
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest

          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "ndk;27.2.12479018" "platforms;android-35"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Build (arm-v7a only)
        run: |
          chmod +x android.sh
          ./android.sh --enable-gpl --full \
            --disable-arm64-v8a \
            --disable-x86 --disable-x86-64 \
            --disable-arm-v7a-neon \
            --no-archive
        timeout-minutes: 350

      - name: Upload libs arm-v7a
        uses: actions/upload-artifact@v4
        with:
          name: libs-armv7a-morph-plus
          path: android/libs/
          retention-days: 1

      - name: Print build log on failure
        if: failure()
        run: tail -500 build.log || echo "build.log not found"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-armv7a-morph-plus
          path: |
            build.log
            src/*/config.log
          retention-days: 7

