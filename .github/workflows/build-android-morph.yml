            build.log
            src/*/config.log
          retention-days: 7

  package:
    name: Package AAR
    needs: [build-armv7a, build-arm64, build-x86, build-x86-64]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT="${HOME}/android-sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd "${ANDROID_SDK_ROOT}/cmdline-tools"
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest

          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV

      - name: Download libs arm-v7a
        uses: actions/download-artifact@v4
        with:
          name: libs-armv7a-morph-plus
          path: android/libs/

      - name: Download libs arm64-v8a
        uses: actions/download-artifact@v4
        with:
          name: libs-arm64v8a-morph-plus
          path: android/libs/

      - name: Download libs x86
        uses: actions/download-artifact@v4
        with:
          name: libs-x86-morph-plus
          path: android/libs/

      - name: Download libs x86_64
        uses: actions/download-artifact@v4
        with:
          name: libs-x86-64-morph-plus
          path: android/libs/

      - name: Verify native libraries
        run: |
          echo "=== Native libraries ==="
          find android/libs -name "*.so" | sort
          echo "=== ABIs found ==="
          ls -d android/libs/*/
          echo "=== Count ==="
          find android/libs -name "*.so" | wc -l

      - name: Package AAR
        run: |
          cd android/ffmpeg-kit-android-lib
          chmod +x ../gradlew
          ../gradlew assembleRelease
          cp build/outputs/aar/*.aar "${GITHUB_WORKSPACE}/ffmpeg-kit-morph-full-16kb.aar"
          ls -lh "${GITHUB_WORKSPACE}/ffmpeg-kit-morph-full-16kb.aar"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-morph-full-16kb
          path: ffmpeg-kit-morph-full-16kb.aar
          retention-days: 90

      - name: Create Release
        if: ${{ inputs.publish_release == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: FFmpeg Kit 6.0-5 (Morph Full 16KB)
          body: |
            FFmpeg Kit Morph release with 16KB page alignment support and full GPL codec set.

            Build flags:
            - --enable-gpl
            - --full

            ABI:
            - armeabi-v7a
            - arm64-v8a
            - x86
            - x86_64

            JitPack dependency:
            implementation("com.github.leventyayla:ffmpeg-kit:${{ inputs.release_tag }}")
          files: ffmpeg-kit-morph-full-16kb.aar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
