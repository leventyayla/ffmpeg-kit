jdk:
  - openjdk17

before_install:
  - TAG="${VERSION}"
  - echo "Downloading AAR for tag ${TAG}..."
  - for i in 1 2 3 4 5; do curl -sL -f --retry 3 --retry-delay 10 "https://github.com/leventyayla/ffmpeg-kit/releases/download/${TAG}/ffmpeg-kit-morph-full-16kb.aar" -o ffmpeg-kit.aar && break || echo "Attempt $i failed, retrying in 15s..." && sleep 15; done
  - ls -lh ffmpeg-kit.aar

install:
  - |
    {
      echo '<project>'
      echo '  <modelVersion>4.0.0</modelVersion>'
      echo '  <groupId>jitpack.runner</groupId>'
      echo '  <artifactId>ffmpeg-kit-runner</artifactId>'
      echo '  <version>1.0.0</version>'
      echo '  <packaging>pom</packaging>'
      echo '</project>'
    } > maven-runner-pom.xml
  - |
    {
      echo '<project>'
      echo '  <modelVersion>4.0.0</modelVersion>'
      echo '  <groupId>com.github.leventyayla</groupId>'
      echo '  <artifactId>ffmpeg-kit</artifactId>'
      echo "  <version>${VERSION}</version>"
      echo '  <packaging>aar</packaging>'
      echo '  <dependencies>'
      echo '    <dependency>'
      echo '      <groupId>com.arthenica</groupId>'
      echo '      <artifactId>smart-exception-java</artifactId>'
      echo '      <version>0.2.1</version>'
      echo '    </dependency>'
      echo '  </dependencies>'
      echo '</project>'
    } > ffmpeg-kit.pom
  - cat ffmpeg-kit.pom
  - mvn -f maven-runner-pom.xml install:install-file -Dfile=ffmpeg-kit.aar -DpomFile=ffmpeg-kit.pom
