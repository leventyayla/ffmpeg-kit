jdk:
  - openjdk17

before_install:
  - TAG="${VERSION}"
  - echo "Downloading AAR for tag ${TAG}..."
  - curl -sL -f "https://github.com/leventyayla/ffmpeg-kit/releases/download/${TAG}/ffmpeg-kit-full-gpl-16kb.aar" -o ffmpeg-kit.aar
  - ls -lh ffmpeg-kit.aar

install:
  - |
    cat > pom.xml << EOF
    <project>
      <modelVersion>4.0.0</modelVersion>
      <groupId>com.github.leventyayla</groupId>
      <artifactId>ffmpeg-kit</artifactId>
      <version>${VERSION}</version>
      <packaging>aar</packaging>
      <dependencies>
        <dependency>
          <groupId>com.arthenica</groupId>
          <artifactId>smart-exception-java</artifactId>
          <version>0.2.1</version>
        </dependency>
      </dependencies>
    </project>
    EOF
  - mvn install:install-file -Dfile=ffmpeg-kit.aar -DpomFile=pom.xml
